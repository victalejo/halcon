name: Halcon Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-verify-email-username:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Core functions
      run: |
        python -m unittest tests/test_core.py

  test-data-export:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Export functions
      run: |
        python -m unittest tests/test_export.py

  test-web:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Runtime deps (rich/reportlab/...) + web layer (fastapi/uvicorn) +
        # test-only deps (pytest runner, httpx for FastAPI's TestClient).
        pip install -r requirements.txt -r requirements-web.txt pytest httpx
    - name: Run Web layer tests
      run: |
        python -m pytest tests/test_web.py -v
